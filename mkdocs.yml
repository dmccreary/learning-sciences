site_name: Learning Sciences
site_description: A interactive intelligent textbook on the emerging field of learning sciences for educators and AI researchers.
site_url: https://learning-sciences.github.io/dmccreary
site_author: 'Dan McCreary'
repo_name: 'GitHub Repo'
site_url: 'https://dmccreary.github.io/learning-sciences/'
repo_url: 'https://github.com/dmccreary/learning-sciences.git'
edit_uri: 'blob/master/docs'


nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md
  - Learning Graph:
      - Introduction: learning-graph/index.md
      - Course Description Assessment: learning-graph/course-description-assessment.md
      - Concept List: learning-graph/concept-list.md
      - Concept Taxonomy: learning-graph/concept-taxonomy.md
      - Quality Metrics: learning-graph/quality-metrics.md
      - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
  - MicroSims:
      - Learning Graph Viewer: sims/graph-viewer/index.md
  - License: license.md
  - Contact: contact.md

# Theme Configuration
theme:
  name: material
  # logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'blue'
    accent: 'orange'
  include_sidebar: true
  features:
    # Code features
    - content.code.copy          # Copy button for code blocks
    - content.code.annotate      # Code annotations

    # Navigation features
    - navigation.expand          # Expandable navigation sections
    - navigation.path            # Breadcrumb navigation path
    - navigation.prune           # Prune inactive navigation items
    - navigation.indexes         # Section index pages
    - navigation.top             # Back to top button
    - navigation.footer          # Previous/next page links in footer
    # - navigation.tabs          # Top-level navigation tabs (optional)
    # - navigation.tabs.sticky   # Sticky tabs (optional)

    # Table of contents
    - toc.follow                 # TOC follows scroll position
    # - toc.integrate            # Integrate TOC into left nav (optional)

    # Content actions
    - content.action.edit        # Edit on GitHub button
    # - content.action.view      # View source button (optional)

    # Search features
    - search.suggest             # Search suggestions
    - search.highlight           # Highlight search terms
    - search.share               # Share search results

# Plugins
plugins:
  - search:
  - social                       # Social media card generation
  - glightbox:                   # Image zoom on click
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
  # - tags                       # Tag support (optional)
  # - blog                       # Blog support (optional)

# Markdown Extensions
markdown_extensions:
  # Basic extensions
  - md_in_html                   # Markdown inside HTML blocks
  - admonition                   # Callout boxes (note, warning, tip, etc.)
  - attr_list                    # Add HTML attributes to elements
  - def_list                     # Definition lists
  - footnotes                    # Footnotes support
  - tables                       # Tables support
  - abbr                         # Abbreviations with tooltips
  - toc:
      permalink: true            # Anchor links for headings
      toc_depth: 4               # TOC depth (includes #### Diagram: headers)

  # PyMdown Extensions
  - pymdownx.details             # Collapsible content blocks
  - pymdownx.superfences:        # Enhanced code fencing
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:          # Syntax highlighting
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite        # Inline code highlighting
  - pymdownx.tabbed:             # Content tabs
      alternate_style: true
  - pymdownx.tasklist:           # Task lists with checkboxes
      custom_checkbox: true
  - pymdownx.emoji:              # Emoji support
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:         # Math support (LaTeX)
      generic: true
  - pymdownx.mark                # Highlighted text
  - pymdownx.smartsymbols        # Smart symbols (arrows, etc.)
  - pymdownx.keys                # Keyboard keys styling
  - pymdownx.caret               # Superscript (^text^)
  - pymdownx.tilde               # Subscript and strikethrough

# Extra CSS
extra_css:
  - css/extra.css
  - css/mascot.css

# Extra JavaScript (for math support)
extra_javascript:
  - js/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Copyright
copyright: Copyright &copy; 2026 Richard Tandler. All rights reserved.


# Extra configuration
extra:
  generator: false               # Hide "Made with Material" footer

  # Page status indicators (rendered as colored dots in the left nav)
  # See docs/css/extra.css for the dot colors.
  status:
    scaffold: Specification and scaffold only
    generated: JavaScript generated, awaiting review
    approved: Approved by Dan or another team member

